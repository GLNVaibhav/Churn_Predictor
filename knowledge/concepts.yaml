  - id: CUSTOMER_LOYALTY
    direction: high_is_good
  - id: ENGAGEMENT_LEVEL
    direction: high_is_good
  - id: SATISFACTION_SIGNAL
    direction: high_is_good
  - id: SUPPORT_FRICTION
    direction: high_is_bad